<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElderCare 管理仪表盘</title>
  <style>
    :root {
      --bg: #F7F2E9; --surface: #FFFFFF; --surface-warm: #FDFBF7;
      --primary: #3D8B78; --primary-dark: #2F6E5F; --primary-soft: #E2F0EB;
      --amber: #C98A2D; --amber-soft: #F8EFDD;
      --text: #33302A; --text-soft: #857D6E; --text-faint: #B0A796;
      --border: #E9E1D2; --danger: #CE4B47; --danger-soft: #FBEBEA;
      --c-chat: #8A8378; --c-health: #3E77C9; --c-psych: #7C63C9;
      --c-emergency: #CE4B47; --c-fraud: #DD7A1E;
      --shadow-sm: 0 1px 2px rgba(70,60,40,.05), 0 1px 4px rgba(70,60,40,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px; line-height: 1.6;
      padding: 24px;
    }
    a { color: var(--primary-dark); }
    button { font-family: inherit; cursor: pointer; }
    .wrap { max-width: 1080px; margin: 0 auto; }

    .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .head h1 { font-size: 21px; color: var(--primary-dark); display: flex; align-items: center; gap: 10px; }
    .head .mark { width: 38px; height: 38px; border-radius: 12px; background: var(--primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
    .head-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-soft); font-size: 14px; text-decoration: none;
      transition: all .15s;
    }
    .btn:hover { color: var(--primary-dark); border-color: var(--primary); }

    .token-box {
      display: none; align-items: center; gap: 10px;
      background: var(--amber-soft); border: 1px solid var(--amber);
      padding: 12px 16px; border-radius: 12px; margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .token-box.show { display: flex; }
    .token-box input {
      flex: 1; min-width: 200px; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 9px;
      font-size: 14px; font-family: inherit; outline: none;
    }
    .token-box button {
      padding: 9px 16px; border: none; border-radius: 9px;
      background: var(--primary); color: #fff; font-size: 14px; font-weight: 600;
    }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 18px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-sm);
    }
    .card .label { font-size: 13px; color: var(--text-soft); margin-bottom: 6px; }
    .card .value { font-size: 30px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .card.alert .value { color: var(--danger); }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    @media (max-width: 760px) { .grid2 { grid-template-columns: 1fr; } }
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-sm);
    }
    .panel h2 { font-size: 15px; color: var(--text-soft); font-weight: 700; margin-bottom: 14px; }

    .donut-row { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
    .legend { flex: 1; min-width: 160px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13.5px; margin-bottom: 7px; color: var(--text-soft); }
    .legend-dot { width: 11px; height: 11px; border-radius: 4px; flex-shrink: 0; }
    .legend-item b { margin-left: auto; color: var(--text); }

    .hbar { margin-bottom: 12px; }
    .hbar .hbar-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .hbar .track { height: 12px; background: var(--bg); border-radius: 999px; overflow: hidden; }
    .hbar .fill { height: 100%; border-radius: 999px; transition: width .5s ease; }

    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th { text-align: left; color: var(--text-faint); font-weight: 600; padding: 6px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 8px 10px; border-bottom: 1px solid var(--surface-warm); vertical-align: top; }
    .tag { display: inline-block; padding: 2px 9px; border-radius: 7px; font-size: 11.5px; font-weight: 700; }
    .tag.WARN { background: #FBF0D3; color: #97690E; }
    .tag.ALERT { background: var(--danger-soft); color: var(--danger); }
    .muted { color: var(--text-faint); font-size: 12.5px; white-space: nowrap; }
    .empty { color: var(--text-faint); text-align: center; padding: 24px 0; }
    #trend svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1><span class="mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path fill="currentColor" fill-opacity="0.22" d="M6.8 3.6 L9.4 5.9 L12 3.4 L14.6 5.9 L17.2 3.6 C17.2 8.2 15.5 12.4 12 12.4 C8.5 12.4 6.8 8.2 6.8 3.6 Z"/><path d="M12 12.4 V21"/><path d="M12 19.6 C12 16.7 9.8 14.6 6.8 14.6 C7.2 17.5 9.2 19.6 12 19.6 Z"/><path d="M12 19.6 C12 16.7 14.2 14.6 17.2 14.6 C16.8 17.5 14.8 19.6 12 19.6 Z"/></svg></span>ElderCare 管理仪表盘</h1>
      <div class="head-actions">
        <a class="btn" href="/">← 返回聊天</a>
        <a class="btn" id="exportLink" href="/admin/export_excel">导出 Excel</a>
        <button class="btn" id="refreshBtn">刷新</button>
      </div>
    </div>

    <div class="token-box" id="tokenBox">
      <span>需要管理口令（服务端设置了 <code>ADMIN_TOKEN</code>）：</span>
      <input type="password" id="tokenInput" placeholder="输入 admin token" />
      <button id="tokenSubmit">确认</button>
    </div>

    <div class="cards">
      <div class="card"><div class="label">累计消息</div><div class="value" id="mTotal">–</div></div>
      <div class="card"><div class="label">会话数</div><div class="value" id="mSessions">–</div></div>
      <div class="card"><div class="label">注册用户</div><div class="value" id="mUsers">–</div></div>
      <div class="card alert"><div class="label">累计告警（ALERT）</div><div class="value" id="mAlerts">–</div></div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h2>意图分布（用户消息）</h2>
        <div class="donut-row">
          <svg id="donut" width="150" height="150" viewBox="0 0 42 42"></svg>
          <div class="legend" id="intentLegend"></div>
        </div>
      </div>
      <div class="panel">
        <h2>日志级别分布</h2>
        <div id="levelBars"></div>
      </div>
    </div>

    <div class="panel" style="margin-bottom:18px">
      <h2>近 14 天消息趋势</h2>
      <div id="trend"></div>
    </div>

    <div class="panel">
      <h2>最近告警 / 关注（WARN + ALERT）</h2>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>时间</th><th>级别</th><th>意图</th><th>内容摘录</th><th>会话</th></tr></thead>
          <tbody id="alertRows"></tbody>
        </table>
      </div>
      <div class="empty" id="alertEmpty" hidden>暂无告警记录</div>
    </div>
  </div>

  <script>
    const INTENT_META = {
      CHAT: ["闲聊陪伴", "var(--c-chat)", "#8A8378"],
      HEALTH: ["健康咨询", "var(--c-health)", "#3E77C9"],
      PSYCH: ["心理关怀", "var(--c-psych)", "#7C63C9"],
      EMERGENCY: ["紧急情况", "var(--c-emergency)", "#CE4B47"],
      FRAUD: ["防诈提醒", "var(--c-fraud)", "#DD7A1E"],
    };
    const LEVEL_COLOR = { INFO: "#8A8378", WARN: "#C98A2D", ALERT: "#CE4B47" };

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    let token = localStorage.getItem("eldercare_admin_token") || "";

    function applyTokenToLinks() {
      $("exportLink").href = "/admin/export_excel" + (token ? `?token=${encodeURIComponent(token)}` : "");
    }

    async function load() {
      applyTokenToLinks();
      let resp;
      try {
        resp = await fetch("/admin/stats", { headers: token ? { "X-Admin-Token": token } : {} });
      } catch { return; }
      if (resp.status === 401) {
        $("tokenBox").classList.add("show");
        return;
      }
      if (!resp.ok) return;
      $("tokenBox").classList.remove("show");
      render(await resp.json());
    }

    function render(d) {
      $("mTotal").textContent = d.total_messages;
      $("mSessions").textContent = d.total_sessions;
      $("mUsers").textContent = d.total_users;
      $("mAlerts").textContent = d.total_alerts;
      renderDonut(d.by_intent || {});
      renderLevels(d.by_log_level || {});
      renderTrend(d.by_day || []);
      renderAlerts(d.recent_alerts || []);
    }

    // 环形图：SVG stroke-dasharray 分段
    function renderDonut(byIntent) {
      const entries = Object.entries(byIntent).filter(([, v]) => v > 0);
      const total = entries.reduce((s, [, v]) => s + v, 0);
      const svg = $("donut");
      if (!total) {
        svg.innerHTML = `<circle cx="21" cy="21" r="15.9" fill="none" stroke="#EFECE4" stroke-width="6"/>`;
        $("intentLegend").innerHTML = `<div class="legend-item">暂无数据</div>`;
        return;
      }
      const C = 2 * Math.PI * 15.9;
      let offset = C / 4; // 从 12 点方向开始
      let paths = "";
      let legend = "";
      for (const [intent, count] of entries) {
        const meta = INTENT_META[intent] || [intent, "#999", "#999"];
        const frac = count / total;
        paths += `<circle cx="21" cy="21" r="15.9" fill="none"
          stroke="${meta[2]}" stroke-width="6"
          stroke-dasharray="${(frac * C).toFixed(2)} ${(C - frac * C).toFixed(2)}"
          stroke-dashoffset="${offset.toFixed(2)}"/>`;
        offset -= frac * C;
        legend += `<div class="legend-item">
          <span class="legend-dot" style="background:${meta[2]}"></span>
          ${esc(meta[0])} <span class="muted">${(frac * 100).toFixed(0)}%</span><b>${count}</b></div>`;
      }
      paths += `<text x="21" y="21.5" text-anchor="middle" dominant-baseline="middle"
        font-size="7" font-weight="700" fill="#33302A">${total}</text>
        <text x="21" y="27.5" text-anchor="middle" font-size="3.2" fill="#B0A796">条提问</text>`;
      svg.innerHTML = paths;
      $("intentLegend").innerHTML = legend;
    }

    function renderLevels(byLevel) {
      const total = Object.values(byLevel).reduce((s, v) => s + v, 0) || 1;
      $("levelBars").innerHTML = ["INFO", "WARN", "ALERT"].map((lv) => {
        const v = byLevel[lv] || 0;
        const pct = ((v / total) * 100).toFixed(1);
        return `<div class="hbar">
          <div class="hbar-head"><span>${lv}</span><span>${v} 条 · ${pct}%</span></div>
          <div class="track"><div class="fill" style="width:${pct}%;background:${LEVEL_COLOR[lv]}"></div></div>
        </div>`;
      }).join("");
    }

    // 近 14 天柱状图（补齐没有数据的日期）
    function renderTrend(byDay) {
      const map = Object.fromEntries(byDay.map((r) => [r.date, r.count]));
      const days = [];
      for (let i = 13; i >= 0; i--) {
        const d = new Date(Date.now() - i * 86400000);
        const key = d.toISOString().slice(0, 10);
        days.push({ key, label: `${d.getUTCMonth() + 1}/${d.getUTCDate()}`, count: map[key] || 0 });
      }
      const max = Math.max(...days.map((d) => d.count), 1);
      const W = 700, H = 190, pad = 24, bw = (W - pad * 2) / days.length;
      let bars = "";
      days.forEach((d, i) => {
        const h = Math.round((d.count / max) * (H - 60));
        const x = pad + i * bw + bw * 0.18;
        const y = H - 38 - h;
        bars += `<rect x="${x.toFixed(1)}" y="${y}" width="${(bw * 0.64).toFixed(1)}" height="${h}"
                   rx="4" fill="${d.count ? "#3D8B78" : "#EFECE4"}"/>`;
        if (d.count) bars += `<text x="${(x + bw * 0.32).toFixed(1)}" y="${y - 6}" text-anchor="middle"
                   font-size="11" fill="#857D6E">${d.count}</text>`;
        bars += `<text x="${(x + bw * 0.32).toFixed(1)}" y="${H - 18}" text-anchor="middle"
                   font-size="10.5" fill="#B0A796">${d.label}</text>`;
      });
      $("trend").innerHTML = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <line x1="${pad}" y1="${H - 38}" x2="${W - pad}" y2="${H - 38}" stroke="#E9E1D2"/>
        ${bars}</svg>`;
    }

    function renderAlerts(rows) {
      $("alertEmpty").hidden = rows.length > 0;
      $("alertRows").innerHTML = rows.map((r) => {
        const meta = INTENT_META[r.intent] || [r.intent || "-", "", "#999"];
        return `<tr>
          <td class="muted">${esc(r.created_at || "")}</td>
          <td><span class="tag ${esc(r.log_level)}">${esc(r.log_level)}</span></td>
          <td><span style="color:${meta[2]};font-weight:600">${esc(meta[0])}</span></td>
          <td>${esc(r.content || "")}…</td>
          <td class="muted">${esc(r.session_id || "")}</td>
        </tr>`;
      }).join("");
    }

    $("tokenSubmit").addEventListener("click", () => {
      token = $("tokenInput").value.trim();
      localStorage.setItem("eldercare_admin_token", token);
      load();
    });
    $("tokenInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("tokenSubmit").click(); });
    $("refreshBtn").addEventListener("click", load);

    load();
  </script>
</body>
</html>
